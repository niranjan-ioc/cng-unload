# Netlify project: iocl-tech-team / cnd-unload
# Site ID (Project ID): 4bd9b0a9-838c-44ff-9dae-8c97c53a46ba
#
# Link this repo locally:
#   npx netlify-cli link --id 4bd9b0a9-838c-44ff-9dae-8c97c53a46ba
#
# REQUIRED for production: API origin (no trailing slash). Used at **build** time
# to generate dist/_redirects so /api/* is proxied to your Express server.
# Netlify → Environment variables → add for **Builds** (and Production if same):
#   VITE_API_URL = https://your-api.example.com
# Then redeploy. npm run build runs scripts/write-netlify-redirects.mjs after Vite.
#
# GitHub → Settings → Secrets and variables → Actions (for .github/workflows/netlify.yml):
#   NETLIFY_AUTH_TOKEN  — User settings → Applications → Personal access tokens → New token
#   NETLIFY_SITE_ID     = 4bd9b0a9-838c-44ff-9dae-8c97c53a46ba
#   VITE_API_URL        — same as Netlify env (needed at build time in CI)

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# SPA + /api proxy: generated in dist/_redirects by scripts/write-netlify-redirects.mjs
